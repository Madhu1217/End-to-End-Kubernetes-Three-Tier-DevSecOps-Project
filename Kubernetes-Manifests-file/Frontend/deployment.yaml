apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: three-tier
  labels:
    role: frontend
    env: demo
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 25%
  selector:
    matchLabels:
      role: frontend
  template:
    metadata:
      labels:
        role: frontend
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: frontend
          image: 493644444921.dkr.ecr.us-east-1.amazonaws.com/madhue2efront:96
          imagePullPolicy: Always
          env:
            - name: REACT_APP_BACKEND_URL
              value: "http://35.170.147.51:5080/api/tasks"
          ports:
            - containerPort: 3000
